<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 880" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t5 d5">
  <title id="t5">Rahat model-first reasoner flow — Gemini 2.5 Flash + tool catalog + memory + voice + Telegram</title>
  <desc id="d5">One inbound message traversed end-to-end: assembler → reasoner loop → tool dispatch → state extractor → voice → splitter → Telegram. Anti-hallucination guarantees marked.</desc>

  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f7f6f2; stroke: #e6e3da; stroke-width: 1; }
    .panel-accent { fill: #fdf6f0; stroke: #d97757; stroke-width: 1.5; }
    .accent { fill: #d97757; }
    .ink { fill: #1a1a1a; font-family: ui-sans-serif, system-ui, sans-serif; }
    .muted { fill: #6b6b6b; font-family: ui-sans-serif, system-ui, sans-serif; }
    .h1 { font-weight: 600; font-size: 16px; }
    .h2 { font-weight: 600; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
    .lbl { font-size: 11px; font-weight: 500; }
    .small { font-size: 10px; }
    .tiny { font-size: 9px; }
    .box { fill: #ffffff; stroke: #e6e3da; stroke-width: 1; }
    .box-accent { fill: #ffffff; stroke: #d97757; stroke-width: 1.5; }
    .box-blue { fill: #f0f5fa; stroke: #6b88a8; stroke-width: 1; }
    .box-green { fill: #f1f6f0; stroke: #7a9270; stroke-width: 1; }
    .arrow { stroke: #b8b3a6; stroke-width: 1.2; fill: none; }
    .arrow-accent { stroke: #d97757; stroke-width: 1.6; fill: none; }
    .arrow-blue { stroke: #6b88a8; stroke-width: 1.4; fill: none; }
    .arrow-green { stroke: #7a9270; stroke-width: 1.4; fill: none; }
    .dashed { stroke-dasharray: 4 3; }
  </style>

  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b8b3a6"/>
    </marker>
    <marker id="arra5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97757"/>
    </marker>
    <marker id="arrb5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b88a8"/>
    </marker>
    <marker id="arrg5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a9270"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="880"/>

  <text class="ink h1" x="40" y="34">Model-first reasoner flow — one inbound message, end to end</text>
  <text class="muted small" x="40" y="52">Gemini 2.5 Flash (default) / 2.5 Pro (high-stakes). Tools = facts. Reasoning = coaching. Memory = state. MODEL-FIRST-PIVOT.md.</text>

  <!-- (1) Inbound -->
  <rect class="box" x="40" y="80" width="200" height="64" rx="6"/>
  <text class="ink lbl" x="140" y="102" text-anchor="middle">① Telegram inbound</text>
  <text class="muted small" x="140" y="120" text-anchor="middle">"I want 198 lbs by 5/22"</text>
  <text class="muted tiny" x="140" y="134" text-anchor="middle">main.py polling loop</text>

  <path class="arrow-accent" d="M 240 112 L 274 112" marker-end="url(#arra5)"/>

  <!-- (2) Assembler -->
  <rect class="panel-accent" x="280" y="80" width="600" height="64" rx="6"/>
  <text class="ink lbl" x="296" y="102">② Context Assembler — builds the [state] block prefix</text>
  <text class="muted small" x="296" y="118">[Today: Fri May 8 2026] [Active goal: 198 lbs by 5/22] [Commitments: hammer week] [Plan: Fri=cf,Sat=z2,Sun=cf]</text>
  <text class="accent tiny" x="296" y="134">memory.list_entities + list_prefs + most_recent_thread → 1 string · ~5 ms · pure-Python</text>

  <path class="arrow-accent" d="M 880 112 L 914 112" marker-end="url(#arra5)"/>
  <rect class="box-accent" x="920" y="80" width="240" height="64" rx="6"/>
  <text class="ink lbl" x="1040" y="102" text-anchor="middle">③ Date stamp prefix</text>
  <text class="muted small" x="1040" y="120" text-anchor="middle">[Today: Friday, May 8, 2026]</text>
  <text class="muted tiny" x="1040" y="134" text-anchor="middle">prevents 2024-anchor hallucination</text>

  <!-- (3) Reasoner loop -->
  <rect class="panel-accent" x="40" y="170" width="1120" height="240" rx="8"/>
  <text class="ink h2" x="60" y="194">④ Reasoner loop — Gemini 2.5 Flash with tool catalog (max 8 hops, 3000 max_tokens)</text>
  <text class="muted small" x="60" y="210">system_text(): athlete profile + coaching mindset + voice rules + anti-hallucination · ~5K tokens · no caching (under threshold)</text>

  <!-- Hop 0 -->
  <rect class="box" x="60" y="226" width="320" height="80" rx="6"/>
  <text class="ink lbl" x="220" y="244" text-anchor="middle">Hop 0 — model decides</text>
  <text class="muted small" x="76" y="262">stop_reason: tool_use</text>
  <text class="muted small" x="76" y="278">function_calls: [compute_goal_plan]</text>
  <text class="muted tiny" x="76" y="294">  args: {target_lbs:198, target_date:"2026-05-22"}</text>

  <path class="arrow-blue" d="M 380 270 L 414 270" marker-end="url(#arrb5)"/>

  <!-- Tool dispatch -->
  <rect class="box-blue" x="420" y="226" width="320" height="80" rx="6"/>
  <text class="ink lbl" x="580" y="244" text-anchor="middle">Tool dispatch (deterministic Python)</text>
  <text class="muted small" x="436" y="262">25 tools registered in SCHEMAS</text>
  <text class="muted small" x="436" y="278">facts only: get_*, compute_*, propose_*</text>
  <text class="muted tiny" x="436" y="294">writes charter-gated: log_*, commit_*, swap_*</text>

  <path class="arrow-blue" d="M 740 270 L 774 270" marker-end="url(#arrb5)"/>

  <!-- Hop 1 -->
  <rect class="box" x="780" y="226" width="320" height="80" rx="6"/>
  <text class="ink lbl" x="940" y="244" text-anchor="middle">Hop 1 — model composes</text>
  <text class="muted small" x="796" y="262">stop_reason: end_turn</text>
  <text class="muted small" x="796" y="278">text: "Bhai, 198 by 5/22 needs 3.22 lb/wk…"</text>
  <text class="muted tiny" x="796" y="294">  Telegram-V1 Markdown · Hyderabadi voice</text>

  <!-- Anti-hallucination guarantees -->
  <rect class="box-green" x="60" y="320" width="540" height="74" rx="6"/>
  <text class="ink lbl" x="76" y="338">Anti-hallucination contract (in system prompt)</text>
  <text class="muted small" x="76" y="354">DATA TOOLS — must call before stating any numeric fact</text>
  <text class="muted small" x="76" y="370">COACHING CONTENT — reason from rich profile, no template tools</text>
  <text class="muted small" x="76" y="386">PLAN-TOTAL VERIFICATION — sum day targets must equal weekly target</text>

  <rect class="box-green" x="620" y="320" width="540" height="74" rx="6"/>
  <text class="ink lbl" x="636" y="338">Coaching mindset (in system prompt)</text>
  <text class="muted small" x="636" y="354">REASON · CONNECT DOTS · TEACH science · PERSONALIZE</text>
  <text class="muted small" x="636" y="370">USER DRIVES, TOOL COMPUTES, COACH WARNS — DON'T REROUTE</text>
  <text class="muted small" x="636" y="386">CONVERSATIONAL CONTINUITY · NO FALSE CELEBRATION</text>

  <!-- (4) State extractor -->
  <rect class="panel-accent" x="40" y="436" width="800" height="100" rx="6"/>
  <text class="ink h2" x="60" y="460">⑤ State Extractor (post-reply) — Gemini Flash JSON-mode</text>
  <text class="muted small" x="60" y="476">parses (user_msg, bot_reply) → writes new entities/commitments/preferences/threads back to substrate</text>

  <rect class="box" x="60" y="488" width="180" height="36" rx="4"/>
  <text class="ink small" x="76" y="510">new_goal → entities</text>
  <rect class="box" x="250" y="488" width="180" height="36" rx="4"/>
  <text class="ink small" x="266" y="510">new_commitments → entities</text>
  <rect class="box" x="440" y="488" width="180" height="36" rx="4"/>
  <text class="ink small" x="456" y="510">new_plan → entities</text>
  <rect class="box" x="630" y="488" width="180" height="36" rx="4"/>
  <text class="ink small" x="646" y="510">new_preferences → prefs</text>

  <!-- Voice + send -->
  <rect class="panel" x="40" y="556" width="540" height="120" rx="8"/>
  <text class="ink h2" x="60" y="580">⑥ Voice layer (deterministic phrasebook)</text>
  <rect class="box" x="60" y="596" width="500" height="32" rx="4"/>
  <text class="ink small" x="76" y="616">core/voice.py — wraps reply with Hyderabadi opener (idempotent on already-dressed text)</text>
  <rect class="box" x="60" y="636" width="500" height="32" rx="4"/>
  <text class="muted small" x="76" y="656">numbers, dates, markdown structure preserved byte-for-byte</text>

  <rect class="panel" x="600" y="556" width="560" height="120" rx="8"/>
  <text class="ink h2" x="620" y="580">⑦ Telegram splitter + send (with retry)</text>
  <rect class="box" x="620" y="596" width="520" height="32" rx="4"/>
  <text class="ink small" x="636" y="616">_split_for_telegram() — paragraph-aware, &lt;=4000 char chunks</text>
  <rect class="box-accent" x="620" y="636" width="520" height="32" rx="4"/>
  <text class="ink small" x="636" y="656">on Markdown parse error → retry as plain text · per-chunk error logging</text>

  <!-- Resilience / fallback -->
  <rect class="panel" x="40" y="696" width="1120" height="100" rx="8"/>
  <text class="ink h2" x="60" y="720">Resilience: two-tier fallback ladder</text>
  <rect class="box" x="60" y="736" width="320" height="42" rx="6"/>
  <text class="ink lbl" x="220" y="754" text-anchor="middle">Gemini 5xx / no key / SDK error</text>
  <path class="arrow" d="M 380 757 L 414 757" marker-end="url(#arr5)"/>
  <rect class="box" x="420" y="736" width="320" height="42" rx="6"/>
  <text class="ink lbl" x="580" y="754" text-anchor="middle">legacy_route() — regex dispatcher</text>
  <path class="arrow" d="M 740 757 L 774 757" marker-end="url(#arr5)"/>
  <rect class="box-accent" x="780" y="736" width="320" height="42" rx="6"/>
  <text class="ink lbl" x="940" y="754" text-anchor="middle">_ensure_nonempty() — never-empty contract</text>

  <text class="accent small" x="60" y="820">Locked by 39 hermetic G-cases (eval_gemini_parity.py) + 21 R-cases (eval_reasoner_robust.py) + 10 B8-cases (eval_reasoner.py).</text>
  <text class="muted small" x="60" y="838">Cost: ~$0.001/turn · Latency: ~2-6s for 1-3 hops · Telegram delivery: ~200ms/chunk</text>
  <text class="muted small" x="60" y="856">Override: RAHAT_LEGACY_DISPATCH=1 bypasses reasoner entirely; use as instant rollback hatch.</text>
</svg>
