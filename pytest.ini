[pytest]
# Rahat test suite — five layers (unit, contract, eval, adversarial, regression).
# All five layers run with `pytest -q` from repo root.
#
# Why we set env here: conftest.py also forces these, but pytest-env
# (when installed) reads `env =` blocks BEFORE any conftest imports —
# which is the safest order if a future conftest tries to import a
# rahat module at the top level.
#
# Keep filterwarnings tight: we want a clean signal in CI.

minversion = 7.0

testpaths =
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Each directory under tests/ is a layer. Markers let CI shard the
# layers across runners and the run_all script render per-layer
# summaries.
markers =
    unit: pure-function unit tests (no I/O)
    contract: agent ABI / charter ABI tests
    eval: scenario-fidelity tests against the Sports Scientist
    adversarial: prompt injection / jailbreak / safety probes
    regression: replay-based regression guards
    fact_grounding: bot must quote correct profile facts (2026-06-13)

# Fail fast on hidden warnings — especially deprecations from google.genai
# stubs — so we notice when the platform shifts under us.
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:dotenv.*

# Forbid live-DB writes by default. tests/conftest.py sets
# RAHAT_TEST_MODE=1 which redirects core.io._resolve_db_path to a
# tempfile. Setting it again here is belt-and-suspenders for users
# who run pytest with their own conftest.
addopts = -ra --strict-markers --strict-config
